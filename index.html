<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Font Playground | QuickUtils</title>
    <script type="application/ld+json">
{
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Font Playground",
    "url": "https://fonts.quickutils.top/",
    "description": "Free online font playground utility.",
    "applicationCategory": "BrowserApplication",
    "operatingSystem": "All",
    "offers": {
        "@type": "Offer",
        "price": "0.00",
        "priceCurrency": "USD"
    }
}
</script>
    <link rel="canonical" href="https://fonts.quickutils.top/">
    <meta name="keywords" content="QuickUtils, font, playground, code, design, productivity, online tools">
    <meta name="robots" content="index, follow">
    
    <meta property="og:title" content="Font Playground | QuickUtils">
    <meta property="og:description" content="Free online font playground utility.">
    <meta property="og:url" content="https://quickutils.top/font-playground/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="description" content="Free online font playground utility.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛠️</text></svg>">
    <link rel="stylesheet" href="quickutils-core.css">
    <link rel="stylesheet" href="style.css">
    <meta name="theme-color" content="#ffffff">
</head>
<body>
    <nav class="navbar"><div class="container nav-inner">
        <a href="https://quickutils.top" class="brand">🚀 Font Playground</a>
        <div class="nav-links">
            <a href="https://ko-fi.com/dayatin" target="_blank" class="kofi-link">☕ Support</a>
            <button id="themeBtn" class="theme-btn">🌙</button>
        </div>
    </div></nav>
    <main class="font-layout">
        <aside class="sidebar">
            <h3>Controls</h3>
            <textarea id="previewText" class="preview-input" placeholder="Type something to preview..." spellcheck="false">The quick brown fox jumps over the lazy dog</textarea>
            
            <div class="control-group">
                <label>Size <span id="fontSizeVal">32px</span></label>
                <input type="range" id="fontSize" min="12" max="120" value="32" style="width:100%">
            </div>
            
            <div class="control-group">
                <label>Weight <span id="fontWeightVal">400</span></label>
                <input type="range" id="fontWeight" min="100" max="900" step="100" value="400" style="width:100%">
            </div>
            
            <div class="control-group">
                <label>Line Height <span id="lineHeightVal">1.5</span></label>
                <input type="range" id="lineHeight" min="0.8" max="2.5" step="0.1" value="1.5" style="width:100%">
            </div>
            
            <div class="control-group">
                <label>Letter Spacing <span id="letterSpacingVal">0px</span></label>
                <input type="range" id="letterSpacing" min="-5" max="20" step="0.5" value="0" style="width:100%">
            </div>
        </aside>
        
        <div class="main-view border-glow">
            <div class="font-grid" id="fontGrid"></div>
        </div>
    </main>
    <footer class="footer"><div class="container copyright">© 2026 QuickUtils. All rights reserved.</div></footer>
    <script src="quickutils-core.js"></script>
    <script src="script.js"></script>
</body>
</html>
